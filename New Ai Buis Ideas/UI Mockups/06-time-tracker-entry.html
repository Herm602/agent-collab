<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Time - Time Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1a1a1a; background: #f9fafb; }
    .container { max-width: 640px; margin: 0 auto; padding: 0 20px; }

    header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 0; }
    .back-link { color: #16a34a; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    main { padding: 40px 0; }
    .form-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 32px; }
    .form-card h1 { font-size: 24px; margin-bottom: 24px; }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-family: inherit; font-size: 15px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: 2px solid #16a34a; border-color: transparent; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-group .hint { font-size: 13px; color: #888; margin-top: 6px; }

    .form-actions { display: flex; gap: 12px; padding-top: 24px; border-top: 1px solid #e5e5e5; }
    .btn { padding: 12px 24px; border-radius: 8px; font-weight: 500; font-size: 15px; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
    .btn-primary { background: #16a34a; color: white; }
    .btn-primary:hover { background: #15803d; }
    .btn-secondary { background: #fff; border: 1px solid #d1d5db; color: #374151; }
    .btn-secondary:hover { background: #f9fafb; }

    .value-preview { margin-top: 16px; padding: 16px; background: #f9fafb; border-radius: 8px; display: flex; align-items: center; gap: 12px; }
    .value-badge { padding: 4px 12px; border-radius: 999px; font-weight: 600; font-size: 14px; }
    .value-badge.high { background: #dcfce7; color: #16a34a; }
    .value-badge.low { background: #fef3c7; color: #b45309; }
    .value-badge.medium { background: #dbeafe; color: #2563eb; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="#" class="back-link">← Back to Dashboard</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="form-card">
        <h1>Log Time</h1>

        <form>
          <div class="form-group">
            <label for="task">What did you work on?</label>
            <input type="text" id="task" placeholder="e.g., Client proposal for ABC Corp" />
            <div class="hint">Be specific - this helps with auto-categorization</div>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="">Select a category...</option>
              <option value="sales">Sales</option>
              <option value="delivery">Delivery</option>
              <option value="admin">Admin</option>
              <option value="strategy">Strategy</option>
              <option value="support">Support</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="duration">How long? (minutes)</label>
            <input type="number" id="duration" placeholder="60" min="5" step="5" />
            <div class="hint">Round to nearest 5 minutes</div>
          </div>

          <div class="form-group">
            <label for="date">When?</label>
            <input type="date" id="date" />
          </div>

          <div class="value-preview">
            <span>Auto-labeled as:</span>
            <span class="value-badge high">$$$ High Value</span>
            <span style="color: #888; font-size: 13px;">(Sales tasks are typically high-value)</span>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Entry</button>
            <a href="#" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
